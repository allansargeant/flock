# flock launcher config — paths are relative to the app's bundled resources
# (see tauri.conf.json `bundle.resources`), so the shipped .app is
# self-contained: it carries the flock binary and a config template.
#
# flock specifics: config is a POSITIONAL arg (not --config), and the web bind
# is the TOP-LEVEL `bind` key (not nested). cwd is omitted so the server runs
# from the writable app-config dir (where it also writes data/registry.json).

[app]
name = "flock"
command = "bin/flock"
args = ["{config}"]
url = "http://{host}:{port}/"
default_port = 8080

[inject]
mode = "configfile"

[inject.configfile]
template = "bin/server-config.toml"
set_key = "bind"
value = "{host}:{port}"

# Palette mirrored from flock's web UI (dark + emerald accent).
[app.theme]
bg = "#14161a"
panel = "#1b1e24"
"panel-2" = "#21252c"
border = "#2c313a"
text = "#e6e8eb"
muted = "#9aa1ac"
dim = "#6b7280"
accent = "#1fae63"
"accent-soft" = "#15271d"
good = "#1fae63"
